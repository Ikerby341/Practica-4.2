<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <!-- Leaflet CSS para el mapa -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/script.js" defer></script>
</head>
<body>

<div class="layout">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-dot"></span>
      Explorer
    </div>
    <span class="header-tag">v1.0 · Mapa Interactivo</span>
  </header>

  <!-- Input zone -->
  <div class="input-zone">
    <div class="input-wrapper">
      <span class="input-icon">⌘</span>
      <input
        class="text-input"
        id="userInput"
        type="text"
        placeholder="Escribe un mensaje, lugar o coordenadas…"
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Enviar
      </button>
    </div>
    <details class="system-info-details">
      <summary>⚙️ Información del Sistema</summary>
      <div class="system-info-wrapper">
        <textarea
          id="systemInfo"
          class="system-input"
          placeholder="Introduce la información que debe tenerse en cuenta en todas las respuestas…"
          rows="2"
        ></textarea>
        <button class="save-system-btn" id="saveSystemBtn">Guardar</button>
      </div>
    </details>
  </div>

  <!-- Messages strip -->
  <div class="messages-strip">
    <div class="message-bubble" id="msgBubble">
      <span class="msg-label">Último</span>
      <span class="msg-text" id="msgText"></span>
    </div>
  </div>

  <!-- Map section -->
  <section class="map-section">
    <div class="map-header">
      <span class="section-label">Vista de mapa</span>
      <div class="map-controls">
        <span id="roadmap-pill" class="map-pill active" >Mapa</span>
        <span id="satellite-pill" class="map-pill" >Satélite</span>
        <span id="terrain-pill" class="map-pill" >Terreno</span>
      </div>
    </div>
    <div class="map-frame-wrapper">
      <div id="mapFrame"></div>
    </div>
  </section>

</div>
</body>
</html>
